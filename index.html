<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bütçe Uygulaması</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #3b82f6; border-top: 3px solid #3b82f6; }
        body { padding-bottom: 70px; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .ios-bottom-nav { padding-bottom: env(safe-area-inset-bottom); height: calc(65px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="flex justify-between items-center">
            <h1 id="page-title" class="text-xl font-bold text-gray-800">Mal Varlığım</h1>
            <div id="status" class="text-xs text-green-500 font-medium bg-green-50 px-2 py-1 rounded">Güncel</div>
        </div>
    </header>

    <main class="p-4">
        <div id="malvarligi" class="tab-content active">
            <div class="grid grid-cols-1 gap-4 mb-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
                    <p class="text-sm text-gray-500 mb-1">Toplam Mal Varlığı</p>
                    <h2 id="total-wealth" class="text-3xl font-black text-blue-600">0.00 TL</h2>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex items-center gap-2 mb-2">
                            <i class="fas fa-wallet text-orange-500"></i>
                            <span class="text-xs font-bold text-gray-600">NAKİT</span>
                        </div>
                        <p id="cash-balance" class="text-lg font-bold text-gray-800">0.00 TL</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex items-center gap-2 mb-2">
                            <i class="fas fa-university text-blue-500"></i>
                            <span class="text-xs font-bold text-gray-600">BANKA</span>
                        </div>
                        <p id="bank-balance" class="text-lg font-bold text-gray-800">0.00 TL</p>
                    </div>
                </div>
            </div>

            <div class="bg-gray-100 p-4 rounded-xl">
                <h3 class="text-xs font-bold text-gray-500 mb-3 uppercase">Başlangıç Bakiyelerini Güncelle</h3>
                <div class="space-y-3">
                    <input type="number" id="init-cash" placeholder="Eldeki Nakit" class="w-full p-2 rounded-lg border text-sm">
                    <input type="number" id="init-bank" placeholder="Bankadaki Para" class="w-full p-2 rounded-lg border text-sm">
                    <button onclick="updateInitialWealth()" class="w-full bg-gray-800 text-white p-2 rounded-lg text-sm font-bold">Bakiyeleri Set Et</button>
                </div>
            </div>
        </div>

        <div id="ozet" class="tab-content">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-500">Net Durum</p>
                    <h2 id="net-balance" class="text-2xl font-bold">0.00 TL</h2>
                </div>
                <div class="text-right">
                    <p id="month-display" class="text-sm font-bold text-blue-600 uppercase"></p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
                    <p class="text-xs text-green-600 font-bold uppercase">Gelir</p>
                    <p id="total-income" class="text-lg font-bold text-green-700">0.00 TL</p>
                </div>
                <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
                    <p class="text-xs text-red-600 font-bold uppercase">Gider</p>
                    <p id="total-expense" class="text-lg font-bold text-red-700">0.00 TL</p>
                </div>
            </div>

            <div class="space-y-3" id="recent-transactions">
                <h3 class="text-sm font-bold text-gray-700 mb-2">Son İşlemler</h3>
                </div>
        </div>

        <div id="ekle" class="tab-content">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
                    <button onclick="setFormType('gider')" id="btn-gider" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white text-red-600 shadow-sm transition-all">GİDER</button>
                    <button onclick="setFormType('gelir')" id="btn-gelir" class="flex-1 py-2 rounded-lg font-bold text-sm text-gray-500 transition-all">GELİR</button>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Miktar</label>
                        <input type="number" id="amount" inputmode="decimal" placeholder="0.00" class="w-full p-4 bg-gray-50 border-none rounded-xl text-xl font-bold focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Kategori</label>
                        <select id="category" class="w-full p-4 bg-gray-50 border-none rounded-xl font-medium"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Ödeme Yöntemi</label>
                        <select id="payment-method" class="w-full p-4 bg-gray-50 border-none rounded-xl font-medium text-blue-600">
                            <option value="Banka">Banka Hesabı</option>
                            <option value="Nakit">Nakit / Cüzdan</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Not (Opsiyonel)</label>
                        <input type="text" id="note" placeholder="Market, Maaş vb." class="w-full p-4 bg-gray-50 border-none rounded-xl">
                    </div>
                    <button onclick="saveTransaction()" id="save-btn" class="w-full bg-red-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform mt-4">KAYDET</button>
                </div>
            </div>
        </div>

        <div id="analiz" class="tab-content">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 text-center">
                <p class="text-gray-500 italic">Analiz grafikleri çok yakında!</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 ios-bottom-nav flex items-center justify-around z-20">
        <button onclick="switchTab('malvarligi')" class="flex flex-col items-center justify-center w-full h-full active-tab" id="nav-malvarligi">
            <i class="fas fa-vault text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Varlıklar</span>
        </button>
        <button onclick="switchTab('ozet')" class="flex flex-col items-center justify-center w-full h-full text-gray-400" id="nav-ozet">
            <i class="fas fa-chart-pie text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Özet</span>
        </button>
        <button onclick="switchTab('ekle')" class="flex flex-col items-center justify-center w-full h-full text-gray-400" id="nav-ekle">
            <div class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg -mt-8 border-4 border-gray-50">
                <i class="fas fa-plus"></i>
            </div>
            <span class="text-[10px] mt-1 font-medium">İşlem</span>
        </button>
        <button onclick="switchTab('analiz')" class="flex flex-col items-center justify-center w-full h-full text-gray-400" id="nav-analiz">
            <i class="fas fa-chart-line text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Analiz</span>
        </button>
    </nav>

    <script>
        // CONFIG & STATE
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let wealthData = JSON.parse(localStorage.getItem('wealthData')) || { cash: 0, bank: 0 };
        let currentType = 'gider';

        const categories = {
            gider: ['Market', 'Ulaşım', 'Yemek', 'Kira', 'Fatura', 'Eğlence', 'Diğer'],
            gelir: ['Maaş', 'Ek Gelir', 'Hediye', 'Diğer']
        };

        const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

        // APP INIT
        function init() {
            updateUI();
            setFormType('gider');
            document.getElementById('month-display').innerText = months[new Date().getMonth()] + ' ' + new Date().getFullYear();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-blue-600'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-gray-400'));

            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active-tab', 'text-blue-600');
            document.getElementById('nav-' + tabId).classList.remove('text-gray-400');

            const titles = { malvarligi: 'Mal Varlığım', ozet: 'Genel Özet', ekle: 'Yeni İşlem', analiz: 'Analiz' };
            document.getElementById('page-title').innerText = titles[tabId];
        }

        function setFormType(type) {
            currentType = type;
            const btnGider = document.getElementById('btn-gider');
            const btnGelir = document.getElementById('btn-gelir');
            const saveBtn = document.getElementById('save-btn');
            const catSelect = document.getElementById('category');

            catSelect.innerHTML = categories[type].map(c => `<option value="${c}">${c}</option>`).join('');

            if (type === 'gider') {
                btnGider.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white text-red-600 shadow-sm";
                btnGelir.className = "flex-1 py-2 rounded-lg font-bold text-sm text-gray-500";
                saveBtn.className = "w-full bg-red-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform mt-4";
                saveBtn.innerText = "GİDERİ KAYDET";
            } else {
                btnGelir.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white text-green-600 shadow-sm";
                btnGider.className = "flex-1 py-2 rounded-lg font-bold text-sm text-gray-500";
                saveBtn.className = "w-full bg-green-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform mt-4";
                saveBtn.innerText = "GELİRİ KAYDET";
            }
        }

        function saveTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const method = document.getElementById('payment-method').value;
            const note = document.getElementById('note').value;

            if (!amount || amount <= 0) return alert("Geçerli bir miktar girin.");

            const transaction = {
                id: Date.now(),
                type: currentType,
                amount: amount,
                category: category,
                method: method,
                note: note,
                date: new Date().toISOString()
            };

            transactions.unshift(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            // Temizle ve dön
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            updateUI();
            switchTab('ozet');
        }

        function updateInitialWealth() {
            const cash = parseFloat(document.getElementById('init-cash').value) || 0;
            const bank = parseFloat(document.getElementById('init-bank').value) || 0;
            
            wealthData = { cash, bank };
            localStorage.setItem('wealthData', JSON.stringify(wealthData));
            
            document.getElementById('init-cash').value = '';
            document.getElementById('init-bank').value = '';
            updateUI();
            alert("Başlangıç bakiyeleri güncellendi.");
        }

        function updateUI() {
            let inc = 0, exp = 0;
            let currentCashFlow = 0;
            let currentBankFlow = 0;

            const list = document.getElementById('recent-transactions');
            list.innerHTML = '<h3 class="text-sm font-bold text-gray-700 mb-2">Son İşlemler</h3>';

            transactions.forEach(t => {
                if (t.type === 'gelir') {
                    inc += t.amount;
                    if (t.method === 'Nakit') currentCashFlow += t.amount;
                    else currentBankFlow += t.amount;
                } else {
                    exp += t.amount;
                    if (t.method === 'Nakit') currentCashFlow -= t.amount;
                    else currentBankFlow -= t.amount;
                }

                // Listeye ekle (Son 10 işlem)
                if (list.children.length < 11) {
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-xl flex justify-between items-center shadow-sm";
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center ${t.type === 'gelir' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                <i class="fas ${t.type === 'gelir' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                            </div>
                            <div>
                                <p class="font-bold text-gray-800 text-sm">${t.category}</p>
                                <p class="text-[10px] text-gray-400 uppercase">${t.method} • ${t.note || 'Not yok'}</p>
                            </div>
                        </div>
                        <p class="font-bold ${t.type === 'gelir' ? 'text-green-600' : 'text-red-600'}">
                            ${t.type === 'gelir' ? '+' : '-'}${t.amount.toLocaleString('tr-TR')} TL
                        </p>
                    `;
                    list.appendChild(div);
                }
            });

            // Özet Ekranı
            document.getElementById('total-income').innerText = inc.toLocaleString('tr-TR') + ' TL';
            document.getElementById('total-expense').innerText = exp.toLocaleString('tr-TR') + ' TL';
            document.getElementById('net-balance').innerText = (inc - exp).toLocaleString('tr-TR') + ' TL';

            // Mal Varlığı Hesaplama (Başlangıç + Akış)
            const finalCash = wealthData.cash + currentCashFlow;
            const finalBank = wealthData.bank + currentBankFlow;
            const totalWealth = finalCash + finalBank;

            document.getElementById('cash-balance').innerText = finalCash.toLocaleString('tr-TR') + ' TL';
            document.getElementById('bank-balance').innerText = finalBank.toLocaleString('tr-TR') + ' TL';
            document.getElementById('total-wealth').innerText = totalWealth.toLocaleString('tr-TR') + ' TL';
        }

        // SERVICE WORKER & AUTO-UPDATE
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if (confirm("Yeni bir güncelleme var! Yüklemek ister misiniz?")) {
                                window.location.reload();
                            }
                        }
                    };
                };
            });
        }

        window.onload = init;
    </script>
</body>
</html>
